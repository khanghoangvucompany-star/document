<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevMastery Central Hub - Cổng Học Tập & Lập Trình AI, DevOps</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Tailwind Config for Premium Tech Theme -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f5f3ff',
                            100: '#ede9fe',
                            500: '#8b5cf6',
                            600: '#7c3aed',
                            700: '#6d28d9',
                            900: '#4c1d95',
                            cyan: '#06b6d4',
                            emerald: '#10b981'
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>
    <!-- React and ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Google Fonts: Plus Jakarta Sans for futuristic look -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #030712; /* Extreme dark */
        }
        /* Glassmorphism utility */
        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #030712;
        }
        ::-webkit-scrollbar-thumb {
            background: #1f2937;
            border-radius: 9999px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #8b5cf6;
        }
    </style>
</head>
<body class="text-slate-100 transition-colors duration-300">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Custom clean SVG Icons for reliable graphics
        const Icons = {
            AI: () => (
                <svg className="w-10 h-10 text-brand-cyan" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
                </svg>
            ),
            DevOps: () => (
                <svg className="w-10 h-10 text-brand-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
            ),
            ArrowRight: () => (
                <svg className="w-5 h-5 transition-transform group-hover:translate-x-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M14 5l7 7m0 0l-7 7m7-7H3" />
                </svg>
            ),
            Search: () => (
                <svg className="w-5 h-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            ),
            Terminal: () => (
                <svg className="w-5 h-5 text-brand-cyan" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
            ),
            Check: () => (
                <svg className="w-5 h-5 text-brand-emerald" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" />
                </svg>
            ),
            Bookmark: () => (
                <svg className="w-5 h-5 text-yellow-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z" />
                </svg>
            )
        };

        function App() {
            const [searchQuery, setSearchQuery] = useState("");
            const [aiProgress, setAiProgress] = useState(0);
            const [devopsProgress, setDevopsProgress] = useState(0);
            const [quickNotes, setQuickNotes] = useState("");

            useEffect(() => {
                try {
                    const savedAi = localStorage.getItem("ai_copilot_roadmap_progress");
                    if (savedAi) {
                        const parsed = JSON.parse(savedAi);
                        const completedCount = Object.values(parsed).filter(status => status === "Completed").length;
                        setAiProgress(Math.min(100, Math.round((completedCount / 8) * 100))); // 8 stages
                    }

                    const savedDevops = localStorage.getItem("devops_roadmap_progress");
                    if (savedDevops) {
                        const parsed = JSON.parse(savedDevops);
                        const completedCount = Object.values(parsed).filter(status => status === "Completed").length;
                        setDevopsProgress(Math.min(100, Math.round((completedCount / 8) * 100))); // 8 stages
                    }

                    const savedNotes = localStorage.getItem("dev_central_notes");
                    if (savedNotes) {
                        setQuickNotes(savedNotes);
                    }
                } catch (e) {
                    // Ignore parsing errors
                }
            }, []);

            const handleSaveNotes = (val) => {
                setQuickNotes(val);
                localStorage.setItem("dev_central_notes", val);
            };

            // Programmatic search filter logic for index search
            const portals = [
                {
                    id: "ai-copilot",
                    title: "Lộ Trình Làm Chủ AI & GitHub Copilot",
                    path: "ai_copilot_roadmap.html",
                    badge: "AI & Prompt Engineering",
                    icon: <Icons.AI />,
                    colorTheme: "from-cyan-500/20 via-brand-600/10 to-transparent hover:border-brand-cyan/40",
                    progress: aiProgress,
                    desc: "Lập trình hiệu suất cực cao cùng trí tuệ nhân tạo. Làm chủ Prompt Engineering chuyên sâu (Zero/Few-Shot, XML formats), cấu hình .github/copilot-instructions, vẽ sơ đồ Mermaid.js và phòng thí nghiệm tương tác (Sandbox Lab) tích hợp Gemini API trực tiếp.",
                    keywords: ["ai", "copilot", "prompt", "gemini", "xml", "instructions", "sandbox", "lab"]
                },
                {
                    id: "devops-docker",
                    title: "Lộ Trình Học DevOps & Docker Thực Tiễn",
                    path: "devops.html",
                    badge: "Infrastructure & Automation",
                    icon: <Icons.DevOps />,
                    colorTheme: "from-brand-600/20 via-purple-600/10 to-transparent hover:border-brand-500/40",
                    progress: devopsProgress,
                    desc: "Học tập và vận hành các hệ thống microservices hiện đại. Đi từ nền tảng Linux, Network cơ bản đến làm chủ đóng gói Container (Docker), xây dựng quy trình CI/CD tích hợp, tự động hóa hạ tầng (Terraform), điều phối Kubernetes (K8s) và giám sát tập trung (Prometheus, Grafana).",
                    keywords: ["devops", "docker", "ci/cd", "kubernetes", "k8s", "terraform", "monitoring", "linux", "network"]
                }
            ];

            const filteredPortals = useMemo(() => {
                if (!searchQuery.trim()) return portals;
                const query = searchQuery.toLowerCase();
                return portals.filter(p => 
                    p.title.toLowerCase().includes(query) || 
                    p.desc.toLowerCase().includes(query) || 
                    p.keywords.some(k => k.includes(query))
                );
            }, [searchQuery, aiProgress, devopsProgress]);

            return (
                <div className="min-h-screen pb-16 relative overflow-hidden bg-slate-950">
                    
                    {/* Background decorations - Tech Ambient Lights */}
                    <div className="absolute top-0 left-1/4 w-[500px] h-[500px] bg-brand-500/10 rounded-full filter blur-[120px] pointer-events-none"></div>
                    <div className="absolute bottom-10 right-1/4 w-[400px] h-[400px] bg-brand-cyan/10 rounded-full filter blur-[100px] pointer-events-none"></div>

                    {}
                    <header className="border-b border-slate-900 bg-slate-950/80 backdrop-blur-md sticky top-0 z-50">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                            <div className="flex items-center space-x-3">
                                <div className="p-2 bg-gradient-to-tr from-brand-600 to-brand-cyan rounded-xl text-white shadow-lg shadow-brand-500/20">
                                    <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
                                    </svg>
                                </div>
                                <div>
                                    <h1 className="font-extrabold text-xl bg-gradient-to-r from-slate-100 via-brand-100 to-brand-cyan bg-clip-text text-transparent">
                                        DevMastery Central Hub
                                    </h1>
                                    <p className="text-[10px] text-slate-400 font-bold tracking-wider uppercase">Cổng học tập & Thực hành cho lập trình viên 2026</p>
                                </div>
                            </div>
                            <div className="flex items-center space-x-4">
                                <span className="flex h-2.5 w-2.5 relative">
                                    <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-brand-cyan opacity-75"></span>
                                    <span className="relative inline-flex rounded-full h-2.5 w-2.5 bg-brand-cyan"></span>
                                </span>
                                <span className="text-xs font-bold text-slate-300 hidden sm:inline">Hệ thống đang hoạt động</span>
                            </div>
                        </div>
                    </header>

                    {/* MAIN CONTAINER */}
                    <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-10 space-y-10 relative z-10">
                        
                        {}
                        {/* HERO PROMPT SECTION */}
                        <div className="glass-panel border border-slate-900 rounded-3xl p-6 sm:p-10 shadow-2xl relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-80 h-80 bg-brand-600/10 rounded-full filter blur-[80px] -translate-y-1/3 translate-x-1/3"></div>
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 items-center">
                                <div className="lg:col-span-8 space-y-4">
                                    <span className="bg-brand-600/20 text-brand-cyan border border-brand-cyan/20 text-xs px-3 py-1 rounded-full font-bold uppercase tracking-wider">
                                        Hạ tầng hiện đại & Trí tuệ nhân tạo
                                    </span>
                                    <h2 className="text-3xl sm:text-5xl font-extrabold leading-tight tracking-tight text-white">
                                        Học Tập Tích Hợp <br />
                                        <span className="bg-gradient-to-r from-brand-cyan via-brand-500 to-indigo-400 bg-clip-text text-transparent">Nâng Tầm Trình Độ Lập Trình</span>
                                    </h2>
                                    <p className="text-slate-400 max-w-xl text-sm sm:text-base leading-relaxed">
                                        Chào mừng bạn đến với Cổng học tập trung tâm. Tại đây, chúng tôi đã đóng gói các hướng dẫn chuẩn chỉ nhất giúp bạn bứt phá năng suất lập trình nhờ AI và nắm vững quy trình vận hành DevOps đẳng cấp quốc tế.
                                    </p>
                                    
                                    {/* SEARCH PORTAL BAR */}
                                    <div className="relative max-w-md pt-2">
                                        <span className="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                                            <Icons.Search />
                                        </span>
                                        <input 
                                            type="text" 
                                            placeholder="Tìm nhanh kỹ năng (docker, prompt, k8s, git, etc)..." 
                                            className="w-full pl-11 pr-4 py-3 bg-slate-950/80 border border-slate-800 rounded-2xl focus:outline-none focus:ring-2 focus:ring-brand-500 text-sm transition-all text-slate-200"
                                            value={searchQuery}
                                            onChange={(e) => setSearchQuery(e.target.value)}
                                        />
                                        {searchQuery && (
                                            <button 
                                                onClick={() => setSearchQuery("")}
                                                className="absolute inset-y-0 right-3 flex items-center text-slate-500 hover:text-white text-xs font-bold"
                                            >
                                                Xóa
                                            </button>
                                        )}
                                    </div>
                                </div>

                                {/* SYSTEM PROGRESS BLOCK */}
                                <div className="lg:col-span-4 bg-slate-900/40 border border-slate-800/80 p-6 rounded-2xl space-y-4">
                                    <h3 className="font-extrabold text-sm uppercase tracking-wider text-slate-300 flex items-center gap-2">
                                        <Icons.Terminal /> Tiến độ học tập chung
                                    </h3>
                                    
                                    <div className="space-y-3.5">
                                        {/* AI Card Progress Indicator */}
                                        <div className="space-y-1.5">
                                            <div className="flex justify-between text-xs font-bold">
                                                <span className="text-brand-cyan">AI & Copilot Mastery</span>
                                                <span className="text-slate-300">{aiProgress}%</span>
                                            </div>
                                            <div className="w-full bg-slate-950 rounded-full h-2 overflow-hidden">
                                                <div 
                                                    className="bg-gradient-to-r from-brand-cyan to-brand-500 h-2 rounded-full transition-all duration-500" 
                                                    style={{ width: `${aiProgress}%` }}
                                                ></div>
                                            </div>
                                        </div>

                                        {/* DevOps Card Progress Indicator */}
                                        <div className="space-y-1.5">
                                            <div className="flex justify-between text-xs font-bold">
                                                <span className="text-brand-500">DevOps & Containerization</span>
                                                <span className="text-slate-300">{devopsProgress}%</span>
                                            </div>
                                            <div className="w-full bg-slate-950 rounded-full h-2 overflow-hidden">
                                                <div 
                                                    className="bg-gradient-to-r from-brand-500 to-indigo-500 h-2 rounded-full transition-all duration-500" 
                                                    style={{ width: `${devopsProgress}%` }}
                                                ></div>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="pt-3 border-t border-slate-800/50 text-[11px] text-slate-500 flex justify-between items-center">
                                        <span>Cập nhật mới nhất: 2026</span>
                                        <span className="text-brand-cyan font-semibold">Tự động sao lưu</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {}
                        {/* PORTAL NAVIGATION CARDS */}
                        <div className="space-y-4">
                            <div className="flex justify-between items-center">
                                <h3 className="font-extrabold text-lg text-slate-200 tracking-tight flex items-center gap-2">
                                    <span className="w-1.5 h-6 bg-brand-600 rounded"></span>
                                    <span>Danh mục Lộ trình huấn luyện</span>
                                </h3>
                                <span className="text-xs text-slate-500">{filteredPortals.length} Cổng kết nối khả dụng</span>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                {filteredPortals.length === 0 ? (
                                    <div className="col-span-2 text-center py-16 bg-slate-900/20 rounded-2xl border border-dashed border-slate-800">
                                        <p className="text-slate-400">Không tìm thấy lộ trình nào phù hợp với từ khóa.</p>
                                    </div>
                                ) : (
                                    filteredPortals.map((portal) => (
                                        <div 
                                            key={portal.id}
                                            className={`glass-panel border border-slate-900 rounded-2xl overflow-hidden shadow-xl transition-all duration-300 hover:scale-[1.01] hover:-translate-y-1 flex flex-col h-full group bg-gradient-to-br ${portal.colorTheme}`}
                                        >
                                            <div className="p-6 sm:p-8 flex-grow space-y-4">
                                                <div className="flex justify-between items-start">
                                                    <div className="p-3 bg-slate-950 rounded-xl border border-slate-800 group-hover:border-slate-700 transition">
                                                        {portal.icon}
                                                    </div>
                                                    <div className="flex flex-col items-end space-y-1.5">
                                                        <span className="text-[10px] font-bold text-slate-300 bg-slate-950/60 border border-slate-800/80 px-2.5 py-1 rounded-full">
                                                            {portal.badge}
                                                        </span>
                                                        <span className="text-[11px] font-bold text-brand-emerald bg-brand-emerald/10 border border-brand-emerald/20 px-2.5 py-0.5 rounded-full">
                                                            Đã hoàn thành {portal.progress}%
                                                        </span>
                                                    </div>
                                                </div>

                                                <div className="space-y-2">
                                                    <h4 className="text-xl font-bold text-white group-hover:text-brand-cyan transition-colors">
                                                        {portal.title}
                                                    </h4>
                                                    <p className="text-sm text-slate-400 leading-relaxed">
                                                        {portal.desc}
                                                    </p>
                                                </div>
                                            </div>

                                            {/* Action redirection bar */}
                                            <div className="px-6 py-4 bg-slate-950/40 border-t border-slate-900/60 flex items-center justify-between group-hover:bg-slate-950/80 transition">
                                                <span className="text-xs text-slate-500 font-semibold group-hover:text-slate-300 transition-colors">
                                                    Khởi chạy môi trường tương tác
                                                </span>
                                                <a 
                                                    href={portal.path}
                                                    className="flex items-center space-x-1.5 text-xs font-bold text-brand-cyan bg-brand-cyan/10 hover:bg-brand-cyan/20 border border-brand-cyan/30 px-4 py-2 rounded-xl transition"
                                                >
                                                    <span>Bắt đầu học</span>
                                                    <Icons.ArrowRight />
                                                </a>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>

                        {}
                        {/* PORTAL UTILITY WIDGETS */}
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
                            
                            {/* Interactive Sticky notes and fast checklist */}
                            <div className="lg:col-span-8 bg-slate-900/30 border border-slate-900 rounded-2xl p-6 space-y-4 shadow-xl">
                                <div className="border-b border-slate-800 pb-3 flex justify-between items-center">
                                    <h3 className="font-extrabold text-base text-slate-200 flex items-center gap-2">
                                        <Icons.Bookmark /> Sổ tay Ghi chú Lập trình viên
                                    </h3>
                                    <span className="text-[10px] bg-slate-800 text-slate-400 px-2 py-0.5 rounded uppercase font-bold">Auto-save</span>
                                </div>
                                <textarea 
                                    rows={5}
                                    className="w-full p-4 bg-slate-950/80 border border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-500 text-sm font-sans text-slate-200 placeholder-slate-600 leading-relaxed"
                                    placeholder="Viết các ghi chú kỹ thuật, lệnh CLI quan trọng, hay cấu hình prompt nháp của bạn vào đây..."
                                    value={quickNotes}
                                    onChange={(e) => handleSaveNotes(e.target.value)}
                                />
                                <div className="text-[11px] text-slate-500 flex justify-between items-center">
                                    <span>Ghi chú này sẽ được lưu giữ tự động trong trình duyệt của bạn.</span>
                                    <button 
                                        onClick={() => handleSaveNotes("")}
                                        className="text-red-400 hover:underline hover:text-red-300 font-semibold"
                                    >
                                        Xóa ghi chú
                                    </button>
                                </div>
                            </div>

                            {/* Dev Checklist */}
                            <div className="lg:col-span-4 bg-slate-900/30 border border-slate-900 rounded-2xl p-6 space-y-4 shadow-xl">
                                <h3 className="font-extrabold text-base text-slate-200 flex items-center gap-2 pb-3 border-b border-slate-800">
                                    <Icons.Check /> Checklist Tiêu chuẩn Lập trình 
                                </h3>
                                
                                <ul className="space-y-3">
                                    {[
                                        "Hiểu cơ chế hoạt động của Context Window",
                                        "Đóng gói thành thạo Container Docker",
                                        "Viết tệp tin .github/copilot-instructions",
                                        "Kiểm thử đầy đủ các nhánh lỗi (Edge Cases)",
                                        "Thiết lập Alerting Rules với Grafana"
                                    ].map((item, idx) => (
                                        <li key={idx} className="flex items-start space-x-2 text-xs text-slate-400">
                                            <span className="mt-0.5"><Icons.Check /></span>
                                            <span>{item}</span>
                                        </li>
                                    ))}
                                </ul>
                            </div>

                        </div>

                    </main>

                    {/* FOOTER */}
                    <footer className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-20 pt-8 border-t border-slate-900 text-center text-xs text-slate-500 space-y-2">
                        <p>© 2026 DevMastery Central Hub. Tất cả các quyền được bảo lưu.</p>
                        <p>Học tập chuyên nghiệp, nhanh gọn và tối ưu hóa năng suất lập trình hàng ngày.</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
