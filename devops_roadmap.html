                                                ))}
                                            </ul>
                                        </div>

                                        {/* Practical Project - Highly emphasized */}
                                        <div className="bg-brand-50/50 dark:bg-slate-950/40 p-5 rounded-xl border border-brand-100 dark:border-brand-900/30">
                                            <div className="flex items-center space-x-2 mb-3">
                                                <span className="p-1 bg-brand-500 text-white rounded">
                                                    <Icons.Code />
                                                </span>
                                                <h4 className="font-extrabold text-sm text-brand-900 dark:text-brand-300 uppercase tracking-wider">
                                                    Thực Hành Thực Tiễn
                                                </h4>
                                            </div>
                                            <h5 className="font-bold text-sm text-slate-800 dark:text-slate-200 mb-1">
                                                {selectedStage.practice.title}
                                            </h5>
                                            <p className="text-xs text-slate-500 dark:text-slate-400 mb-3 leading-relaxed">
                                                {selectedStage.practice.desc}
                                            </p>
                                            <div className="space-y-1.5 border-t border-brand-200/50 dark:border-brand-900/20 pt-3">
                                                <p className="text-[11px] font-bold text-slate-400 dark:text-slate-500 uppercase">Các bước thực hiện:</p>
                                                {selectedStage.practice.steps.map((step, idx) => (
                                                    <div key={idx} className="flex items-start space-x-2 text-xs text-slate-600 dark:text-slate-300">
                                                        <span className="font-bold text-brand-600 dark:text-brand-400">{idx+1}.</span>
                                                        <span>{step}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>

                                        {/* Reference Academies/Docs */}
                                        <div>
                                            <h4 className="font-bold text-sm text-slate-900 dark:text-white uppercase tracking-wider mb-3 flex items-center space-x-2">
                                                <span className="w-1.5 h-3 bg-indigo-500 rounded"></span>
                                                <span>Tài Liệu & Khóa Học Uy Tín</span>
                                            </h4>
                                            <div className="grid grid-cols-1 gap-2">
                                                {selectedStage.resources.map((res, i) => {
                                                    const isYoutube = res.type === "youtube";
                                                    const isUdemy = res.type === "udemy";
                                                    
                                                    return (
                                                        <a 
                                                            key={i} 
                                                            href={res.url} 
                                                            target="_blank" 
                                                            rel="noreferrer"
                                                            className="flex items-center justify-between p-3 bg-slate-50 hover:bg-slate-100 dark:bg-slate-800/50 dark:hover:bg-slate-800 border border-slate-100 dark:border-slate-800 rounded-lg text-xs font-semibold text-slate-700 dark:text-slate-300 transition-all"
                                                        >
                                                            <div className="flex items-center space-x-2 min-w-0 mr-2">
                                                                {isYoutube && (
                                                                    <span className="flex items-center space-x-1 bg-red-50 text-red-600 dark:bg-red-950/40 dark:text-red-400 text-[10px] px-1.5 py-0.5 rounded font-bold uppercase flex-shrink-0">
                                                                        <Icons.YoutubeIcon />
                                                                        <span className="hidden sm:inline">YouTube</span>
                                                                    </span>
                                                                )}
                                                                {isUdemy && (
                                                                    <span className="flex items-center space-x-1 bg-purple-50 text-purple-600 dark:bg-purple-950/40 dark:text-purple-400 text-[10px] px-1.5 py-0.5 rounded font-bold uppercase flex-shrink-0">
                                                                        <Icons.UdemyIcon />
                                                                        <span className="hidden sm:inline">Udemy</span>
                                                                    </span>
                                                                )}
                                                                {!isYoutube && !isUdemy && (
                                                                    <span className="bg-blue-50 text-blue-600 dark:bg-blue-950/40 dark:text-blue-400 text-[10px] px-1.5 py-0.5 rounded font-bold uppercase flex-shrink-0">
                                                                        Tài liệu
                                                                    </span>
                                                                )}
                                                                <span className="truncate">{res.name}</span>
                                                            </div>
                                                            <Icons.ExternalLink />
                                                        </a>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* TIPS & MOTIVATION BOX */}
                                <div className="bg-gradient-to-br from-indigo-50 to-brand-50 dark:from-slate-900 dark:to-indigo-950 p-5 rounded-2xl border border-indigo-100/50 dark:border-indigo-900/30 flex items-start space-x-4">
                                    <span className="text-2xl">💡</span>
                                    <div>
                                        <h4 className="font-bold text-sm text-indigo-950 dark:text-indigo-300">Lời khuyên cho bạn</h4>
                                        <p className="text-xs text-slate-500 dark:text-slate-400 mt-1 leading-relaxed">
                                            Hãy cố gắng hoàn thành từng dự án nhỏ trước khi nhảy sang chương tiếp theo. Việc mắc lỗi (errors) khi viết file yaml hay script chính là cơ hội quý giá nhất để bạn nâng cao kỹ năng Debug - kỹ năng cốt lõi của một DevOps Engineer xuất sắc.
                                        </p>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </main>

                    {/* FOOTER */}
                    <footer className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-16 pt-8 border-t border-slate-200 dark:border-slate-800 text-center text-xs text-slate-500">
                        <p>© 2026 Lộ Trình DevOps Thực Chiến. Xây dựng dựa trên các tài liệu đào tạo của roadmap.sh, KodeKloud, freeCodeCamp, Udemy.</p>
                        <p className="mt-1">Dữ liệu tiến độ được tự động lưu cục bộ trên trình duyệt của bạn (Local Storage).</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
