Nhiệm vụ của bạn là tối ưu hóa prompt thô mà người dùng nhập vào để tạo ra một prompt hoàn hảo để chạy trên GitHub Copilot hoặc các LLM khác.
Cấu trúc đầu ra của bạn phải bao gồm các phần rõ ràng bằng Markdown:
1. **Mục tiêu chính**: Xác định nhiệm vụ cốt lõi.
2. **Vai trò kiến nghị (Role)**: Đặt vai trò chuyên môn cho AI.
3. **Ngữ cảnh & Các khối thẻ XML gợi ý (<context>, <rules>, <constraints>)**: Tổ chức dữ liệu đầu vào.
4. **Ràng buộc nghiêm ngặt (Strict Constraints)**: Giúp giảm lỗi ảo tưởng.
5. **Prompt Hoàn Thiện (Bản Copy-Ready)**: Đoạn prompt tối ưu hóa cuối cùng để lập trình viên chỉ cần copy-paste.`;

                try {
                    const result = await callGeminiAPI(systemPrompt, `Hãy tối ưu hóa prompt lập trình sau đây: "${rawPrompt}"`);

                } catch (err) {

                    setIsOptimizing(false);

Phản hồi trực tiếp bằng mã Markdown của tệp tin cấu hình, giải thích ngắn gọn lý do chọn các cấu hình đó ở phần cuối.`;

Framework: ${techFramework}
Phong cách code & Kiến trúc: ${codingStyle}`;

2. Thiết lập cấu trúc bộ Unit Test hoàn thiện sử dụng framework kiểm thử tương thích với ngôn ngữ của code (ví dụ: Jest cho JS/TS, PyTest cho Python).

                                                                <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" />
                                                            </svg>
                                                            <span>Đang phân tích & kiểm thử...</span>
                                                        </span>
                                                    ) : (
                                                        <span>Bắt Đầu Kiểm Tra</span>
                                                    )}
                                                </button>
                                            </div>

                                            {testResult && (
                                                <div className="bg-slate-950 p-5 rounded-xl border border-slate-800 mt-4 relative">
                                                    <div className="flex justify-between items-center mb-3 border-b border-slate-800 pb-2">
                                                        <span className="text-[10px] font-bold text-ai-cyan uppercase tracking-wider">Báo cáo bảo mật & Test Suite</span>
                                                        <button 
                                                            onClick={() => copyToClipboard(testResult)}
                                                            className="flex items-center space-x-1 text-xs bg-slate-900 border border-slate-800 hover:border-slate-700 text-slate-300 px-2.5 py-1 rounded-lg transition"
                                                        >
                                                            <Icons.Copy />
                                                            <span>Sao chép kết quả</span>
                                                        </button>
                                                    </div>
                                                    <div className="prose prose-invert max-w-none text-xs text-slate-300 leading-relaxed overflow-x-auto whitespace-pre-wrap max-h-96">
                                                        {testResult}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    )}

                                </div>

                            </div>
                        )}

                    </main>

                    {/* FOOTER */}
                    <footer className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-16 pt-8 border-t border-slate-900 text-center text-xs text-slate-500 space-y-2">
                        <p>© 2026 AI & GitHub Copilot Mastery Roadmap. Giáo trình chuẩn hóa chuyên nghiệp tích hợp Gemini API.</p>
                        <p>Dữ liệu huấn luyện, tiến độ học, và API Key được tự động lưu trữ cục bộ bảo mật thông qua Local Storage của bạn.</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
